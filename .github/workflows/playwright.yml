name: Playwright QA Scraper

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: 24f2007798@ds.study.iitm.ac.in - Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run scraper
        run: node scraper.js
